title: Lily Rudin
description: A Masters Student in Computational Analysis and Public Policy at the University of Chicago with expected graduation date in 2027. 5 Years prior work experience as a data scientist in educational technology. 
baseurl: "/lilyrudin.github.io"
url: "https://lrudin.github.io" # the base hostname & protocol for your site, e.g. http://example.com


# Build settings
markdown: kramdown
permalink: pretty
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll/tagging

paginate: 5
paginate_path: "/page/:num"


# Pages Path
defaults:
  - scope:
      path: '_pages'
    values:
      permalink: /:basename:output_ext

include:
  - _pages


# Tags
tag_page_dir:         tag
tag_page_layout:      tag_page
tag_permalink_style:  pretty

sass:
  sass_dir: _sass
  style: compressed

